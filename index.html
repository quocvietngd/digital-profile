<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Profile - Trần Quốc Việt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <img src="https://scontent.fhan15-1.fna.fbcdn.net/v/t39.30808-6/618157722_4380867482145283_2131838737060086002_n.jpg?_nc_cat=109&ccb=1-7&_nc_sid=1d70fc&_nc_eui2=AeGhX3nBjkAyMDUzrSFh11AZ63dWy411Pofrd1bLjXU-h7El1cFLJfrM-3zjs7R2NxU8_1vRdTzwInlLkrMUZjj_&_nc_ohc=vBDIVtRxqtIQ7kNvwEYiZvu&_nc_oc=Adr8Gykj8axZOHJC7y-itK3SS0r3gE6smGwa2ZlP74KptH81RUpJNFfpF1T7-4p7H0_N9nfkOPv--WvflmhSTDn8&_nc_zt=23&_nc_ht=scontent.fhan15-1.fna&_nc_gid=wv-gWablJQkS_RnD-17dVQ&_nc_ss=7a3a8&oh=00_Af0cWFKzO_RJJ8OkPPhuKuf9IppOw_hvaoZxIzbgjBGCuQ&oe=69DDA910" alt="Ảnh đại diện" class="profile-img">
                <h1 class="name">Trần Quốc Việt</h1>
                <p class="position">CEO tại JOYWORK</p>
            </div>
            <div class="links">
                <a href="https://www.facebook.com/Donald0106/" class="btn btn-primary" target="_blank">Facebook</a>
                <a href="https://zalo.me/0856111901" class="btn btn-success" target="_blank">Zalo</a>
                <a href="https://linkedin.com/in/quốc-việt-trần-801b74401/?skipRedirect=true" class="btn btn-info" target="_blank">LinkedIn</a>
            </div>
            <button id="giftBtn" class="btn btn-warning mt-3">Tặng quà</button>
                        <div class="game-section mt-4 mb-4">
                            <h3>🎲 Game Đoán Số (1-20)</h3>
                            <form id="guessForm">
                                <input type="number" id="guessInput" min="1" max="20" placeholder="Nhập số từ 1-20" required>
                                <button type="submit" class="btn btn-game">Đoán</button>
                            </form>
                            <div id="gameStatus" class="game-status"></div>
                        </div>
            <div class="message-section mt-5">
                <h3>Để lại lời nhắn</h3>
                <form id="messageForm">
                    <input type="text" id="senderName" placeholder="Việt" required>
                    <textarea id="messageText" placeholder="Xin chào!" rows="4" required></textarea>
                    <button type="submit" class="btn btn-submit">Gửi</button>
                </form>
                <div id="messageStatus" class="message-status"></div>
                <div id="messagesList" class="messages-list"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
