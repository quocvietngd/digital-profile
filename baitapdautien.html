<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Quốc Việt - CEO JOYWORK</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <div class="profile-card">
            <!-- Profile Image -->
            <div class="image-container">
                <img src="https://scontent.xx.fbcdn.net/v/t1.6435-9/s720x720/271824648_4380867478811950_4066126373346223689_n.jpg?_nc_cat=1&ccb=1-7&_nc_sid=5f2e22&_nc_ohc=sVrJ7v_VgE0Q7kNvgN6LpbI&_nc_ht=scontent.xx&oh=02_AdTJ5L-8X4-Z5RKVKRx5-eVmQZQy4vwfGl5qPGQVHYQfXA&oe=67C5B8F7" alt="Trần Quốc Việt" class="profile-image">
            </div>

            <!-- Name and Title -->
            <h1 class="name">Trần Quốc Việt</h1>
            <p class="title">CEO at JOYWORK</p>
            
            <!-- Description -->
            <p class="description">Passionate about innovation and building amazing products</p>

            <!-- Social Links -->
            <div class="social-links">
                <a href="https://www.facebook.com/Donald0106/" target="_blank" class="social-btn facebook" title="Facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="https://zalo.me/0856111901" target="_blank" class="social-btn zalo" title="Zalo">
                    <i class="fas fa-phone"></i>
                </a>
                <a href="https://linkedin.com/in/quốc-việt-trần-801b74401/?skipRedirect=true" target="_blank" class="social-btn linkedin" title="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </div>

            <!-- Gift Button -->
            <button class="gift-btn" id="giftBtn">
                <i class="fas fa-gift"></i> Tặng quà
            </button>

            <!-- Additional Info -->
            <div class="info-section">
                <p class="info-text">Let's connect and create something extraordinary together!</p>
            </div>
        </div>
    </div>

    <!-- Confetti Container -->
    <canvas id="confetti-canvas"></canvas>

    <script src="confetti.js"></script>
    <script src="script.js"></script>
</body>
</html>
